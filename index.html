<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          oklch(0.97 0.012 95);
    --surface:     oklch(1 0 0);
    --header-bg:   oklch(0.99 0.005 95);
    --sidebar-bg:  oklch(0.19 0.018 145);
    --ink:         oklch(0.22 0.012 140);
    --ink-inv:     oklch(0.97 0.008 95);
    --muted:       oklch(0.52 0.018 130);
    --muted-inv:   oklch(0.65 0.018 140);
    --line:        oklch(0.9 0.01 110);
    --line-inv:    oklch(0.31 0.018 140);
    --green:       oklch(0.50 0.16 150);
    --green-deep:  oklch(0.4 0.12 152);
    --green-soft:  oklch(0.93 0.045 152);
    --on-green:    oklch(0.98 0.01 150);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font: 400 15px/1.6 'Inter', ui-sans-serif, system-ui, sans-serif;
    background: var(--bg); color: var(--ink); }
  #app { display: contents; }
  .shell { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: 58px 1fr; min-height: 100vh; }

  .header { grid-column: 1/-1; display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; background: var(--header-bg); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 1px 0 var(--line), 0 2px 8px oklch(0.2 0.02 140 / 0.04); }
  .brand { display: flex; align-items: center; gap: 9px; }
  .logo { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 7px;
    background: var(--green); color: var(--on-green); font-size: 0.95rem; font-weight: 700; }
  .brand-name { font-family: 'Plus Jakarta Sans', ui-sans-serif, sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.025em; }
  .brand-tag { font-size: 0.75rem; color: var(--muted); margin-left: 3px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--green-soft);
    border: 2px solid var(--green); display: grid; place-items: center;
    font-size: 0.75rem; font-weight: 700; color: var(--green-deep); }

  .sidebar { grid-column: 1; grid-row: 2; background: var(--sidebar-bg);
    padding: 18px 10px; display: flex; flex-direction: column; gap: 2px; }
  .sidebar-section { padding-bottom: 16px; border-bottom: 1px solid var(--line-inv); margin-bottom: 8px; }
  .sidebar-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted-inv); padding: 0 10px; margin-bottom: 6px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px;
    color: var(--muted-inv); font-size: 0.85rem; cursor: default;
    transition: background 180ms ease, color 180ms ease; }
  .nav-item:hover { background: var(--line-inv); color: var(--ink-inv); }
  .nav-item.active { background: oklch(0.28 0.055 152); color: var(--on-green); }
  .nav-icon { width: 18px; text-align: center; font-size: 0.95rem; }

  .workspace { grid-column: 2; grid-row: 2; padding: 36px 44px; overflow-y: auto;
    box-shadow: inset 1px 0 0 var(--line);
    animation: fadeIn 200ms ease; }
  .ws-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; }
  .ws-title { font-family: 'Plus Jakarta Sans', ui-sans-serif, sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; }
  .count { padding: 3px 10px; font-size: 0.75rem; font-weight: 600;
    color: var(--green-deep); background: var(--green-soft); border-radius: 999px; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    padding: 24px; }
  form { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; max-width: 480px; }
  label { font-size: 0.72rem; font-weight: 500; color: var(--muted); }
  .row { display: flex; gap: 7px; }
  input { flex: 1; min-width: 0; padding: 9px 12px; font: inherit; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line); border-radius: 8px; }
  input::placeholder { color: var(--muted); }
  input:focus-visible { outline: 2px solid var(--green); outline-offset: 1px; border-color: transparent; }
  button { font: inherit; cursor: pointer; border: 0; border-radius: 8px; }
  .add { padding: 9px 17px; font-weight: 600; color: var(--on-green); background: var(--green); }
  .add:hover { filter: brightness(1.07); }
  .tabs { display: flex; gap: 2px; margin-bottom: 14px; }
  .tab { padding: 5px 11px; font-size: 0.75rem; font-weight: 600; border-radius: 6px;
    color: var(--muted); cursor: default; user-select: none; }
  .tab.active { color: var(--green-deep); background: var(--green-soft); }
  .upnext { margin-bottom: 11px; font-size: 0.75rem; font-weight: 600; color: var(--green-deep); }
  .empty { display: grid; place-items: center; gap: 4px; min-height: 120px; text-align: center;
    color: var(--muted); border: 1px dashed var(--line); border-radius: 9px; }
  .empty strong { color: var(--ink); font-size: 0.95rem; display: block; margin-bottom: 4px; }
  .empty span { font-size: 0.75rem; }
  ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  li { display: flex; align-items: center; gap: 10px; padding: 10px 10px 10px 14px;
    background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
    animation: rise 200ms cubic-bezier(0.22, 1, 0.36, 1); }
  li span { flex: 1; min-width: 0; word-break: break-word; font-size: 0.875rem; }
  .del { display: grid; place-items: center; width: 27px; height: 27px; flex: none;
    font-size: 1.05rem; color: var(--muted); background: transparent; border: 1px solid var(--line);
    border-radius: 8px; }
  .del:hover { color: oklch(0.55 0.2 25); border-color: oklch(0.55 0.2 25 / 0.4); }
  .foot { margin-top: 13px; font-size: 0.75rem; color: var(--muted); }
  @keyframes rise { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  @keyframes fadeIn { from { opacity: 0.6; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { li { animation: none; } }

  .status-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .status-badge.s-todo { color: var(--muted); background: var(--bg); border: 1px solid var(--line); }
  .status-badge.s-inprogress { color: oklch(0.45 0.12 80); background: oklch(0.96 0.04 80); border: 1px solid oklch(0.88 0.06 80); }
  .status-badge.s-done { color: var(--green-deep); background: var(--green-soft); }
  .status-btn { display: grid; place-items: center; width: 24px; height: 24px; flex-shrink: 0;
    background: transparent; border: 0; font-size: 1rem; color: var(--muted); padding: 0;
    cursor: pointer; border-radius: 50%; }
  .status-btn:hover { background: var(--bg); color: var(--ink); }
  .status-btn.s-done { color: var(--green); }
  .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .task-done { text-decoration: line-through; opacity: 0.5; }

  .kb-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding-top: 4px; }
  .kb-col { background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 18px; display: flex; flex-direction: column; gap: 8px; min-height: 200px; }
  .kb-col-head { font-family: 'Plus Jakarta Sans', ui-sans-serif, sans-serif; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); margin-bottom: 4px;
    display: flex; justify-content: space-between; align-items: center; }
  .kb-col-head .kb-count { font-size: 0.7rem; background: var(--bg); border: 1px solid var(--line);
    border-radius: 999px; padding: 1px 7px; }
  .kb-card { background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 14px; font-size: 0.875rem; cursor: grab;
    transition: border-color 150ms ease, box-shadow 150ms ease; }
  .kb-card:hover { border-color: var(--green); box-shadow: 0 2px 8px oklch(0.52 0.15 152 / 0.12); }
  .kb-card:active { cursor: grabbing; }
  .kb-col.drag-over { background: oklch(0.93 0.045 152 / 0.3); }
  .kb-empty { font-size: 0.75rem; color: var(--muted); text-align: center;
    padding: 20px 0; font-style: italic; }
</style>
</head>
<body>
<div id="app"></div>
<script>
  const items = [];
  let interacted = false;
  let currentView = 'home';
  const app = document.getElementById('app');

  // Event delegation — attached once to #app, survives every render()
  app.addEventListener('submit', (e) => {
    if (!e.target.matches('#add-form')) return;
    e.preventDefault();
    const name = document.getElementById('task-field').value.trim();
    if (!name) return;
    items.push({ name, status: 'todo' });
    interacted = true;
    render();
  });

  app.addEventListener('click', (e) => {
    const nav = e.target.closest('[data-nav]');
    if (nav) { currentView = nav.dataset.nav; render(); return; }
    const cycle = e.target.closest('[data-cycle]');
    if (cycle) {
      const i = parseInt(cycle.dataset.cycle, 10);
      const order = ['todo', 'in-progress', 'done'];
      items[i].status = order[(order.indexOf(items[i].status) + 1) % 3];
      render();
      return;
    }
    const del = e.target.closest('[data-del]');
    if (!del) return;
    items.splice(parseInt(del.dataset.del, 10), 1);
    render();
  });

  const plural = (n, w) => n + ' ' + w + (n === 1 ? '' : 's');

  function render() {
    app.innerHTML = '';   // entire screen — header, sidebar, workspace — blanks here

    // PLANTED BUG: items[0].name on empty array — intentional, do not "fix".
    const upnext = interacted ? ('Up next: ' + items[0].name) : null;

    const n = items.length;
    const shell = document.createElement('div');
    shell.className = 'shell';

    // ── Header ──────────────────────────────────────────────────────────────
    shell.insertAdjacentHTML('beforeend', `
      <header class="header">
        <div class="brand">
          <span class="logo" aria-hidden="true">✓</span>
          <span class="brand-name">TaskFlow</span>
          <span class="brand-tag">— Plan less. Do more.</span>
        </div>
        <div class="avatar" aria-hidden="true">H</div>
      </header>`);

    // ── Sidebar ──────────────────────────────────────────────────────────────
    shell.insertAdjacentHTML('beforeend', `
      <nav class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Workspace</div>
          <div class="nav-item${currentView === 'home' ? ' active' : ''}" data-nav="home"><span class="nav-icon">⊞</span>Home</div>
          <div class="nav-item${currentView === 'kanban' ? ' active' : ''}" data-nav="kanban"><span class="nav-icon">⊟</span>Kanban View</div>
          <div class="nav-item"><span class="nav-icon">⚙</span>Settings</div>
        </div>
      </nav>`);

    // ── Workspace ────────────────────────────────────────────────────────
    const ws = document.createElement('main');
    ws.className = 'workspace';

    if (currentView === 'home') {
      ws.insertAdjacentHTML('beforeend', `
        <div class="ws-head">
          <h1 class="ws-title">My Tasks</h1>
          <span class="count">${plural(n, 'task')}</span>
        </div>`);

      const panel = document.createElement('div');
      panel.className = 'panel';

      panel.insertAdjacentHTML('beforeend', `
        <form id="add-form">
          <label for="task-field">New task</label>
          <div class="row">
            <input id="task-field" type="text" placeholder="New task" autocomplete="off">
            <button class="add" type="submit">Add</button>
          </div>
        </form>
        <div class="tabs" aria-hidden="true">
          <span class="tab active">All</span>
          <span class="tab">Active</span>
          <span class="tab">Completed</span>
        </div>`);

      if (upnext) {
        const p = document.createElement('p');
        p.className = 'upnext';
        p.textContent = upnext;
        panel.appendChild(p);
      }

      if (n === 0) {
        panel.insertAdjacentHTML('beforeend',
          '<div class="empty"><strong>No tasks yet</strong><span>Add your first task above.</span></div>');
      } else {
        const ul = document.createElement('ul');
        items.forEach((item, i) => {
          const li = document.createElement('li');

          // Priority dot
          const dot = document.createElement('span');
          dot.className = 'priority-dot';
          dot.setAttribute('aria-hidden', 'true');
          dot.style.background = item.name.includes('!') ? 'oklch(0.55 0.2 25)' : 'var(--line)';

          // Name span
          const span = document.createElement('span');
          span.textContent = item.name;
          if (item.status === 'done') span.classList.add('task-done');

          // Status badge
          const badge = document.createElement('span');
          badge.className = 'status-badge';
          if (item.status === 'todo') {
            badge.classList.add('s-todo');
            badge.textContent = 'To Do';
          } else if (item.status === 'in-progress') {
            badge.classList.add('s-inprogress');
            badge.textContent = 'In Progress';
          } else {
            badge.classList.add('s-done');
            badge.textContent = 'Done';
          }

          // Cycle button
          const cycleBtn = document.createElement('button');
          cycleBtn.className = 'status-btn';
          cycleBtn.type = 'button';
          cycleBtn.setAttribute('aria-label', 'cycle status');
          cycleBtn.dataset.cycle = i;
          if (item.status === 'todo') {
            cycleBtn.textContent = '○';
          } else if (item.status === 'in-progress') {
            cycleBtn.textContent = '◑';
          } else {
            cycleBtn.textContent = '●';
            cycleBtn.classList.add('s-done');
          }

          // Delete button
          const del = document.createElement('button');
          del.className = 'del'; del.type = 'button';
          del.setAttribute('aria-label', 'delete task');
          del.dataset.del = i;
          del.textContent = '×';

          li.append(dot, span, badge, cycleBtn, del);
          ul.appendChild(li);
        });
        panel.appendChild(ul);
      }

      const foot = document.createElement('p');
      foot.className = 'foot';
      foot.textContent = plural(n, 'item') + ' left';
      panel.appendChild(foot);

      ws.appendChild(panel);
    } else {
      // ── Kanban View ──────────────────────────────────────────────────────
      ws.insertAdjacentHTML('beforeend', `
        <div class="ws-head">
          <h1 class="ws-title">Kanban Board</h1>
          <span class="count">${plural(n, 'task')}</span>
        </div>`);

      const columns = [
        { label: 'To Do',       status: 'todo' },
        { label: 'In Progress', status: 'in-progress' },
        { label: 'Done',        status: 'done' },
      ];

      const board = document.createElement('div');
      board.className = 'kb-board';

      columns.forEach(({ label, status }) => {
        const col = document.createElement('div');
        col.className = 'kb-col';

        const colItems = items.filter(item => item.status === status);

        const head = document.createElement('div');
        head.className = 'kb-col-head';
        head.innerHTML = `${label}<span class="kb-count">${colItems.length}</span>`;
        col.appendChild(head);

        if (colItems.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'kb-empty';
          empty.textContent = 'Drop tasks here';
          col.appendChild(empty);
        } else {
          colItems.forEach((item) => {
            const idx = items.indexOf(item);
            const card = document.createElement('div');
            card.className = 'kb-card';
            card.draggable = true;
            card.textContent = item.name;
            card.addEventListener('dragstart', (e) => {
              e.dataTransfer.setData('text/plain', String(idx));
            });
            col.appendChild(card);
          });
        }

        col.addEventListener('dragover', (e) => {
          e.preventDefault();
          col.classList.add('drag-over');
        });
        col.addEventListener('dragleave', () => {
          col.classList.remove('drag-over');
        });
        col.addEventListener('drop', (e) => {
          e.preventDefault();
          col.classList.remove('drag-over');
          const idx = parseInt(e.dataTransfer.getData('text/plain'), 10);
          items[idx].status = status;
          render();
        });

        board.appendChild(col);
      });

      ws.appendChild(board);
    }

    shell.appendChild(ws);
    app.appendChild(shell);
  }

  render();
</script>
</body>
</html>
